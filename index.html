<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniCanvasArt — Unique Designs on Redbubble</title>
  <meta name="description" content="Explore unique art prints, stickers, t-shirts and gifts by MiniCanvasArt. Available on Redbubble.">
  <meta property="og:title" content="MiniCanvasArt">
  <meta property="og:description" content="Unique designs for cat lovers, gamers, coffee addicts and more.">

<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🎨</span>
        <div>
          <h1>MiniCanvasArt</h1>
          <p class="tagline">Unique designs for everyday moments</p>
        </div>
      </div>
      <a href="https://www.redbubble.com/people/minicanvasart" target="_blank" class="btn-shop-all">

    <div class="gallery" id="gallery"></div>
